<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AI Club</title>
  <meta name="description" content="Sign in to your AI Club account to see challenges and track your progress." />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 90 66' fill='none'><path d='M12 56 Q12 8 29 8 Q46 8 46 32 L46 56' stroke='%230470fc' stroke-width='15' stroke-linecap='round' stroke-linejoin='round'/><path d='M46 56 Q46 8 63 8 Q80 8 80 32 L80 56' stroke='%230470fc' stroke-width='15' stroke-linecap='round' stroke-linejoin='round'/></svg>" />

  <style>
    .auth-bg-1 { position:fixed;top:-120px;left:-120px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(4,112,252,.1) 0%,transparent 65%);pointer-events:none; }
    .auth-bg-2 { position:fixed;bottom:-80px;right:-80px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(18,187,254,.07) 0%,transparent 65%);pointer-events:none;animation:glowPulse 5s ease-in-out infinite; }
    .auth-bg-3 { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(12,52,233,.05) 0%,transparent 65%);pointer-events:none; }
    .auth-back { position:fixed;top:1.5rem;left:2rem;display:flex;align-items:center;gap:.5rem;font-size:.8rem;font-weight:600;color:var(--text-muted);text-decoration:none;letter-spacing:.05em;transition:color var(--t);z-index:10; }
    .auth-back:hover { color:var(--c-light); }
    .auth-back svg { width:16px;height:16px; }
    /* Social button icon sizing */
    .social-btn svg { width:18px;height:18px; }
  </style>
</head>
<body>

<div class="auth-bg-1"></div>
<div class="auth-bg-2"></div>
<div class="auth-bg-3"></div>

<a href="home.html" class="auth-back">
  <i data-lucide="chevron-left"></i>
  Back to Home
</a>

<!-- ══ AUTH CARD ════════════════════════════════════════════════ -->
<main class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <a href="home.html" class="logo" style="justify-content:center;" aria-label="AI Club Home">
        <img src="../images/mainlogo.png" class="logo__mark" style="width:48px;height:48px;" alt="AI Club" />
        <div class="logo__text" style="font-size:1.05rem;">
          Artificial Intelligence<small>Club</small>
        </div>
      </a>
    </div>

    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Sign in to see your challenges and track your progress.</p>

    <!-- Form -->
    <form>
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <label class="form-label" for="login-pw">Password</label>
          <a href="#" style="font-size:.72rem;color:var(--c-cyan);font-weight:600;">Forgot password?</a>
        </div>
        <input class="form-input" type="password" id="login-pw" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <!-- Remember me -->
      <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1.5rem;">
        <div style="width:16px;height:16px;border:1.5px solid var(--border-hi);border-radius:4px;flex-shrink:0;cursor:pointer;"></div>
        <span style="font-size:.82rem;color:var(--text-muted);">Keep me signed in for 30 days</span>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In</button>

      <div class="auth-divider">or continue with</div>

      <!-- Social buttons -->
      <div style="display:flex;flex-direction:column;gap:.7rem;">
        <button type="button" class="btn btn-outline btn-block social-btn" style="gap:.7rem;font-size:.83rem;">
          <!-- Google SVG icon -->
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button type="button" class="btn btn-outline btn-block social-btn" style="gap:.7rem;font-size:.83rem;">
          <!-- GitHub SVG icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--c-light)" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          Continue with GitHub
        </button>
      </div>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="signup.html">Make one for free →</a>
    </p>

  </div>
</main>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
